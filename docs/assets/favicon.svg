<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Honor Roll capybara">
  <defs>
    <linearGradient id="fvbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#fvbg)"/>
  <!-- ears -->
  <ellipse cx="22" cy="23" rx="6.5" ry="6" fill="#a9764e"/>
  <ellipse cx="42" cy="23" rx="6.5" ry="6" fill="#a9764e"/>
  <!-- head -->
  <rect x="15" y="20" width="34" height="31" rx="14" fill="#c79a6b"/>
  <!-- muzzle -->
  <rect x="20" y="35" width="24" height="15" rx="7.5" fill="#b9885a"/>
  <!-- eyes -->
  <circle cx="26" cy="31" r="3" fill="#3a3266"/>
  <circle cx="38" cy="31" r="3" fill="#3a3266"/>
  <!-- nostrils -->
  <circle cx="28.5" cy="42" r="1.7" fill="#6b4a2f"/>
  <circle cx="35.5" cy="42" r="1.7" fill="#6b4a2f"/>
</svg>
