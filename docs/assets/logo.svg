<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Honor roll crown + star emblem -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="gstar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
  </defs>
  <!-- Crown base -->
  <rect x="10" y="18" width="44" height="32" rx="6" fill="url(#g)"/>
  <rect x="10" y="18" width="44" height="32" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Crown peaks -->
  <polygon points="18,18 22,8 26,18" fill="url(#g)"/>
  <polygon points="32,18 36,6 40,18" fill="url(#g)"/>
  <polygon points="46,18 50,8 54,18" fill="url(#g)"/>
  <!-- Center star emblem -->
  <circle cx="32" cy="34" r="12" fill="url(#gstar)"/>
  <!-- Inner star shape -->
  <path d="M32 26 L35 32 L41 32 L37 37 L39 43 L32 38 L25 43 L27 37 L23 32 L29 32 Z" fill="#ffffff" fill-opacity="0.95"/>
</svg>
