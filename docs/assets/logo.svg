<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="Honor Roll capybara mascot">
  <defs>
    <linearGradient id="hrbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="88" height="88" rx="26" fill="url(#hrbg)"/>

  <!-- capybara: blocky loaf head, calm meme face -->
  <!-- ears (small, set wide and low like a capybara) -->
  <ellipse cx="29" cy="44" rx="6.5" ry="6" fill="#a07a55"/>
  <ellipse cx="67" cy="44" rx="6.5" ry="6" fill="#a07a55"/>
  <!-- head: wide, blunt, slightly rectangular -->
  <rect x="24" y="40" width="48" height="40" rx="16" fill="#c79a6b"/>
  <!-- big blunt muzzle (the capybara signature) -->
  <rect x="30" y="58" width="36" height="22" rx="13" fill="#bb8c5d"/>
  <!-- sleepy half-closed eyes -->
  <path d="M35 51 q4 3 8 0" stroke="#3a3266" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M53 51 q4 3 8 0" stroke="#3a3266" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- nostrils + soft smile -->
  <ellipse cx="42" cy="65" rx="2.3" ry="1.8" fill="#6b4a2f"/>
  <ellipse cx="54" cy="65" rx="2.3" ry="1.8" fill="#6b4a2f"/>
  <path d="M43 72 q5 4 10 0" stroke="#6b4a2f" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- iconic yuzu orange resting on the head -->
  <circle cx="48" cy="33" r="9" fill="#ff9f43"/>
  <circle cx="48" cy="33" r="9" fill="none" stroke="#e8852a" stroke-width="1.2"/>
  <path d="M48 25 q3 -3 6 -2 q-1 3 -4 3.5 z" fill="#4caf50"/>
  <path d="M48 24.5 l0 3" stroke="#7a5230" stroke-width="1.6" stroke-linecap="round"/>
  <ellipse cx="50" cy="29.5" rx="2.4" ry="1.4" fill="#ffd9a8" opacity="0.8"/>
</svg>
