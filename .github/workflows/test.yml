name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core + cli (editable, with dev extras)
        run: |
          pip install --upgrade pip
          pip install -e ./packages/core[dev] -e ./packages/cli

      - name: Run unit + E2E test suite
        run: pytest -ra --tb=short

      - name: Verify scaffolder scaffold round-trips
        run: |
          lvt-honor init /tmp/smoke --slug ci-smoke --non-interactive
          test -f /tmp/smoke/honor.config.json
          test -f /tmp/smoke/api/index.py
          test -f /tmp/smoke/requirements.txt
