name: publish-docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install mkdocs-material mkdocs-static-i18n
      - name: Build site
        run: mkdocs build --strict
      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
