services:
  honor-portal:
    build: .
    image: luonvuitoi-honor:latest
    container_name: honor-portal
    ports:
      - "8000:8000"
    environment:
      # Admin login — set these in your .env (compose reads it automatically).
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SECRET_KEY: ${SECRET_KEY:-}
      # Pin the public origin so generated links can't be Host-header spoofed.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    volumes:
      # The entire project directory is bind-mounted so editing honor.config.json
      # on the host + restarting the container picks up the change without a
      # rebuild. Mount your own honor.config.json + data/ here.
      - ./project:/app/project:rw
    restart: unless-stopped
    healthcheck:
      # Probe the dependency-free /health endpoint.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
