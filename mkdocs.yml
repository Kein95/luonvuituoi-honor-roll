site_name: LUONVUITUOI-HONOR ROLL
site_description: Config-driven student honor-roll toolkit — publish multi-competition / multi-year award galleries with search and admin, zero boilerplate.
site_url: https://kein95.github.io/luonvuituoi-honor-roll
repo_url: https://github.com/Kein95/luonvuituoi-honor-roll
repo_name: Kein95/luonvuituoi-honor-roll
edit_uri: edit/main/docs/
docs_dir: docs
copyright: Copyright &copy; 2026 LUONVUITUOI-HONOR ROLL — MIT License

theme:
  name: material
  language: en
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Inter
    code: JetBrains Mono
  features:
    # navigation.instant incompatible with mkdocs-static-i18n language switcher.
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.tooltips
  palette:
    # Auto — follows OS preference. Must come first; no scheme key.
    - media: "(prefers-color-scheme)"
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to system preference

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/theme-picker.js

extra:
  generator: false
  alternate:
    - name: English
      link: /luonvuituoi-honor-roll/
      lang: en
    - name: Tiếng Việt
      link: /luonvuituoi-honor-roll/vi/
      lang: vi
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Kein95/luonvuituoi-honor-roll
      name: GitHub repository
    - icon: fontawesome/brands/python
      link: https://github.com/Kein95/luonvuituoi-honor-roll/tree/main/packages
      name: Python packages

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - User guide: user-guide.md
  - Configuration: config-reference.md
  - Architecture: architecture.md
  - Guides:
      - Admin Auth: admin-auth.md
      - Security: security.md
      - Operations: operations.md
      - Troubleshooting: troubleshooting.md
  - Deploy:
      - Vercel: deploy-vercel.md
      - Docker: deploy-docker.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark
  - pymdownx.keys

plugins:
  - search:
      separator: '[\s​\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: vi
          name: Tiếng Việt
          build: true
          nav_translations:
            Home: Trang chủ
            Quickstart: Bắt đầu nhanh
            User guide: Hướng dẫn sử dụng
            Configuration: Cấu hình
            Architecture: Kiến trúc
            Guides: Hướng dẫn
            Admin Auth: Xác thực quản trị
            Security: Bảo mật
            Operations: Vận hành
            Troubleshooting: Khắc phục sự cố
            Deploy: Triển khai
            Vercel: Vercel
            Docker: Docker
