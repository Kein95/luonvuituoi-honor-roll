[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "luonvuitoi-honor"
version = "0.1.0"
description = "Config-driven student honor-roll engine (multi-competition / multi-year listings, search, admin)"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "LUONVUITUOI-HONOR ROLL contributors" }]
keywords = ["honor-roll", "hall-of-fame", "awards", "students", "competition", "vercel"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP :: WSGI :: Application",
    "Typing :: Typed",
]
dependencies = [
    "pandas>=2.0.0",
    "openpyxl>=3.1.0",
    "pydantic>=2.0.0",
    "jinja2>=3.1.0",
    "faker>=20.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.4.0", "pytest-cov>=4.1.0", "ruff>=0.1.0", "mypy>=1.7.0"]

[project.urls]
Homepage = "https://github.com/Kein95/luonvuituoi-honor-roll"

[tool.hatch.build.targets.wheel]
packages = ["luonvuitoi_honor"]
