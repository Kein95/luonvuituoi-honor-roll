[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "luonvuitoi-honor-cli"
version = "0.1.0"
description = "Scaffolder CLI for LUONVUITUOI-HONOR ROLL toolkit (lvt-honor)"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "LUONVUITUOI-HONOR ROLL contributors" }]
dependencies = [
    "typer>=0.9.0",
    "rich>=13.7.0",
    "jinja2>=3.1.0",
    "flask>=2.3.0",
    "luonvuitoi-honor>=0.1.0",
    "faker>=20.0.0",
    "openpyxl>=3.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.4.0", "ruff>=0.1.0"]

[project.scripts]
lvt-honor = "luonvuitoi_honor_cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["luonvuitoi_honor_cli"]
